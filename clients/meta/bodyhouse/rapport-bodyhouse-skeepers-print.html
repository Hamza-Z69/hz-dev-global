<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Body House — Rapport Performance Skeepers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:#242424;line-height:1.4;-webkit-print-color-adjust:exact;print-color-adjust:exact;background:#fff}

@page{size:A4 landscape;margin:0}

/* === PAGES === */
.pg{width:297mm;height:210mm;padding:12mm 16mm;position:relative;overflow:hidden;page-break-after:always;page-break-inside:avoid}
.pg:last-child{page-break-after:auto}

/* === COVER === */
.cover{width:297mm;height:210mm;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#2d2024 0%,#242424 40%,#1a1818 100%);color:#fff;text-align:center;padding:20mm;position:relative;overflow:hidden;page-break-after:always}
.cover::before{content:'';position:absolute;width:160mm;height:160mm;border-radius:50%;background:rgba(241,157,118,0.06);top:-50mm;right:-50mm}
.cover::after{content:'';position:absolute;width:100mm;height:100mm;border-radius:50%;background:rgba(241,157,118,0.05);bottom:-30mm;left:-30mm}
.cover img{height:22mm;filter:brightness(0) invert(1);margin-bottom:12mm;position:relative;z-index:1}
.cover h1{font-size:28pt;font-weight:800;letter-spacing:-0.5px;margin-bottom:3mm;position:relative;z-index:1}
.cover h2{font-size:13pt;font-weight:400;opacity:.85;position:relative;z-index:1;margin-bottom:2mm}
.cover .subtitle{font-size:10pt;opacity:.55;position:relative;z-index:1}
.cover .period{margin-top:10mm;padding:2.5mm 8mm;border:0.3mm solid rgba(241,157,118,.35);border-radius:8mm;font-size:9.5pt;letter-spacing:.3px;position:relative;z-index:1;color:#F19D76}
.cover .footer{position:absolute;bottom:8mm;font-size:7.5pt;opacity:.35;z-index:1}

/* === SECTION HEADER === */
.sh{display:flex;align-items:center;gap:3.5mm;margin-bottom:5mm;padding-bottom:3mm;border-bottom:0.6mm solid #F19D76}
.sh .num{width:10mm;height:10mm;border-radius:50%;background:linear-gradient(135deg,#F19D76,#d4845c);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10pt;flex-shrink:0}
.sh h2{font-size:13pt;font-weight:700;color:#242424}
.sh .tag{font-size:6.5pt;background:#fdf6f2;color:#d4845c;padding:1mm 3mm;border-radius:5mm;font-weight:600;text-transform:uppercase;letter-spacing:.3px;border:0.3mm solid #f1dbcf}

/* === EXEC === */
.exec-title{font-size:16pt;font-weight:800;color:#242424;margin-bottom:1.5mm}
.exec-sub{color:#888;margin-bottom:5mm;font-size:8.5pt}

/* === KPI === */
.kpis{display:flex;gap:3mm;margin-bottom:5mm}
.kpi{flex:1;background:#fdf6f2;border-radius:3mm;padding:4mm;position:relative;overflow:hidden;border-left:1mm solid #F19D76}
.kpi .kl{font-size:6pt;text-transform:uppercase;letter-spacing:.4px;color:#999;margin-bottom:1.5mm;font-weight:600}
.kpi .kv{font-size:14pt;font-weight:800;color:#242424}
.kpi .ks{font-size:6pt;color:#aaa;margin-top:1mm}

/* === RANKING === */
.ranking{margin-bottom:5mm}
.ranking h3{font-size:9pt;font-weight:700;margin-bottom:3mm;color:#242424}
.rank-cols{display:flex;gap:8mm}
.rank-col{flex:1}
.rank-item{display:flex;align-items:center;gap:2.5mm;margin-bottom:2mm;font-size:7.5pt}
.rank-pos{width:5.5mm;height:5.5mm;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:6pt;flex-shrink:0;background:#f5f0ed;color:#666}
.rank-pos.g{background:linear-gradient(135deg,#ffd700,#ffb300);color:#5d4200}
.rank-pos.s{background:linear-gradient(135deg,#e0e0e0,#bdbdbd);color:#424242}
.rank-pos.b{background:linear-gradient(135deg,#d4a373,#bc8a5f);color:#3e2723}
.rank-name{font-weight:600;flex:1}
.rank-bar-bg{flex:1.5;height:1.8mm;background:#f5f0ed;border-radius:1mm;overflow:hidden}
.rank-bar{height:100%;border-radius:1mm;background:linear-gradient(90deg,#F19D76,#f1c4a8)}
.rank-val{font-weight:700;color:#d4845c;min-width:14mm;text-align:right}

/* === BOUTIQUE BARS === */
.bout-bars{margin-bottom:4mm}
.bout-bars h3{font-size:9pt;font-weight:700;margin-bottom:3mm;color:#242424}
.bb-cols{display:flex;gap:8mm}
.bb-col{flex:1}
.bb-item{display:flex;align-items:center;gap:2.5mm;margin-bottom:2.2mm;font-size:7.5pt}
.bb-name{width:22mm;text-align:right;font-weight:600;flex-shrink:0}
.bb-bar-bg{flex:1;height:2.5mm;background:#f5f0ed;border-radius:1.2mm;overflow:hidden}
.bb-bar{height:100%;border-radius:1.2mm;background:linear-gradient(90deg,#F19D76,#f1c4a8)}
.bb-val{min-width:18mm;font-weight:700;color:#d4845c;text-align:right}
.bb-note{font-size:6pt;color:#bbb;font-style:italic}

/* === TABLE === */
.tbl-wrap{border-radius:2mm;overflow:hidden;margin-bottom:4mm;border:0.3mm solid #f0ebe8}
table{width:100%;border-collapse:collapse}
th{background:#242424;color:#fff;padding:2mm 2.5mm;text-align:left;font-size:6pt;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
th:not(:first-child){text-align:right}
td{padding:1.8mm 2.5mm;border-bottom:0.2mm solid #f0ebe8;font-size:7.5pt}
td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
tr:nth-child(even) td{background:#fdfaf8}
tr:last-child td{border-bottom:none}
td:first-child{font-weight:600}
.total-row td{background:#fdf6f2!important;font-weight:700;color:#d4845c;border-top:0.4mm solid #F19D76}

/* === ANALYSIS === */
.analysis{background:linear-gradient(135deg,#fdf6f2 0%,#f1dbcf 100%);border-radius:2.5mm;padding:3.5mm 5mm;font-size:7.5pt;line-height:1.6;color:#4a3028}
.analysis strong{color:#c2714a}

/* === NO DATA === */
.no-data{background:#f5f0ed;border-radius:3mm;padding:15mm;text-align:center;color:#999;font-size:9pt}
</style>
</head>

  h+=kpi('Impressions totales',sn(tI),'Tous contenus confondus');
  h+=kpi('Audience unique totale',sn(tR),'Nombre de personnes atteintes');
  h+=kpi('Contenus sponsorisés',tA.toString(),iS.size+' influenceuses mobilisées');
  h+=kpi('Engagements totaux',sn(tE),'Interactions sur les contenus');
  h+='</div>';

  // ALL influencers — 2 columns
  const iT={};
  BOUTIQUES.forEach(b=>{b.ads.forEach(a=>{if(!iT[a.i])iT[a.i]={imp:0};if(a.imp!=null)iT[a.i].imp+=a.imp})});
  const all=Object.entries(iT).sort((a,b)=>b[1].imp-a[1].imp);
  const mx=all[0][1].imp;
  const mid=Math.ceil(all.length/2);

  h+='<div class="ranking"><h3>Classement des influenceuses — par impressions totales</h3>';
  h+='<div class="rank-cols"><div class="rank-col">';
  all.slice(0,mid).forEach(([n,d],i)=>{
    const c=i===0?'g':i===1?'s':i===2?'b':'n';
    h+=`<div class="rank-item"><div class="rank-pos ${c}">${i+1}</div><div class="rank-name">${n}</div><div class="rank-bar-bg"><div class="rank-bar" style="width:${(d.imp/mx*100).toFixed(0)}%"></div></div><div class="rank-val">${sn(d.imp)}</div></div>`;
  });
  h+='</div><div class="rank-col">';
  all.slice(mid).forEach(([n,d],i)=>{
    const idx=mid+i;
    h+=`<div class="rank-item"><div class="rank-pos n">${idx+1}</div><div class="rank-name">${n}</div><div class="rank-bar-bg"><div class="rank-bar" style="width:${(d.imp/mx*100).toFixed(0)}%"></div></div><div class="rank-val">${sn(d.imp)}</div></div>`;
  });
  h+='</div></div></div>';

  // Boutique bars — 2 columns
  const bd=BOUTIQUES.filter(b=>!b.isNational).map(b=>({name:b.name,imp:b.noData?0:sumF(b.ads,'imp'),noData:!!b.noData})).sort((a,b)=>b.imp-a.imp);
  const mb=bd[0].imp;
  const bmid=Math.ceil(bd.length/2);

  h+='<div class="bout-bars"><h3>Impressions par boutique</h3>';
  h+='<div class="bb-cols"><div class="bb-col">';
  bd.slice(0,bmid).forEach(b=>{
    h+=`<div class="bb-item"><div class="bb-name">${b.name}</div><div class="bb-bar-bg"><div class="bb-bar" style="width:${mb?(b.imp/mb*100).toFixed(0):0}%"></div></div><div class="bb-val">${b.noData?'<span class="bb-note">Pas de Skeepers</span>':sn(b.imp)}</div></div>`;
  });
  h+='</div><div class="bb-col">';
  bd.slice(bmid).forEach(b=>{
    h+=`<div class="bb-item"><div class="bb-name">${b.name}</div><div class="bb-bar-bg"><div class="bb-bar" style="width:${mb?(b.imp/mb*100).toFixed(0):0}%"></div></div><div class="bb-val">${b.noData?'<span class="bb-note">Pas de Skeepers</span>':sn(b.imp)}</div></div>`;
  });
  h+='</div></div></div>';
  h+='</div>';

  // --- PER BOUTIQUE ---
  let num=0;
  BOUTIQUES.forEach(b=>{
    num++;
    h+='<div class="pg">';
    const tag=b.isNational?'National':b.noData?'Pas de données':b.ads.length+' contenu'+(b.ads.length>1?'s':'');
    h+=`<div class="sh"><div class="num">${num}</div><h2>${b.label||b.name}</h2><span class="tag">${tag}</span></div>`;

    if(b.noData){
      h+='<div class="no-data">Pas de contenu Skeepers activé sur cette boutique durant la période.<br>Les campagnes utilisaient uniquement des visuels et vidéos internes Body House.</div></div>';
      return;
    }

    const tImp=sumF(b.ads,'imp'),tRe=sumF(b.ads,'reach'),tEn=sumF(b.ads,'eng'),tW5=sumF(b.ads,'w50'),tW1=sumF(b.ads,'w100');

    h+='<div class="kpis">';
    h+=kpi('Impressions',sn(tImp),'');
    h+=kpi('Audience unique',sn(tRe),tRe?'':'Donnée partielle');
    h+=kpi('Engagements',sn(tEn),tImp?'Taux : '+pct(tEn,tImp):'');
    h+=kpi('Rétention 50%',tImp?pct(tW5,tImp):'—',tW5?'Complétion : '+pct(tW1,tW5):'');
    h+='</div>';

    h+='<div class="tbl-wrap"><table>';
    h+='<tr><th>Influenceuse</th><th>Impressions</th><th>Audience unique</th><th>Engagements</th><th>Réactions</th><th>Clics</th><th>CTR</th><th>Vues 50%</th><th>Vues 100%</th></tr>';
    b.ads.forEach(a=>{
      h+=`<tr><td>${a.i}</td><td>${fmt(a.imp)}</td><td>${fmt(a.reach)}</td><td>${fmt(a.eng)}</td><td>${fmt(a.react)}</td><td>${fmt(a.clicks)}</td><td>${a.ctr?a.ctr.toFixed(2).replace('.',',')+'%':'—'}</td><td>${fmt(a.w50)}</td><td>${fmt(a.w100)}</td></tr>`;
    });
    if(b.ads.length>1){
      h+=`<tr class="total-row"><td>TOTAL</td><td>${fmt(tImp)}</td><td>${fmt(tRe)}</td><td>${fmt(tEn)}</td><td>${fmt(sumF(b.ads,'react'))}</td><td>${fmt(sumF(b.ads,'clicks'))}</td><td>—</td><td>${fmt(tW5)}</td><td>${fmt(tW1)}</td></tr>`;
    }
    h+='</table></div>';

    if(b.analysis) h+=`<div class="analysis">${b.analysis}</div>`;
    h+='</div>';
  });

  app.innerHTML=h;
}

function kpi(l,v,s){
  return`<div class="kpi"><div class="kl">${l}</div><div class="kv">${v}</div>${s?'<div class="ks">'+s+'</div>':''}</div>`;
}

render();
</script>
</body>
</html>
