<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body House — Rapport Performance Skeepers — Saint-Valentin 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#fef5f7;color:#242424;line-height:1.5;-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* === COVER === */
.cover{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#2d1a22 0%,#1e1218 40%,#1a0f14 100%);color:#fff;text-align:center;padding:40px;position:relative;overflow:hidden}
.cover::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:rgba(214,80,110,0.08);top:-180px;right:-180px}
.cover::after{content:'';position:absolute;width:350px;height:350px;border-radius:50%;background:rgba(232,160,180,0.06);bottom:-100px;left:-100px}
.cover .hearts{position:absolute;width:100%;height:100%;top:0;left:0;pointer-events:none;z-index:0;overflow:hidden}
.cover .hearts span{position:absolute;font-size:1.4rem;opacity:.08;animation:floatHeart 12s infinite ease-in-out}
.cover .hearts span:nth-child(1){left:8%;top:15%;animation-delay:0s}
.cover .hearts span:nth-child(2){left:85%;top:25%;animation-delay:2s;font-size:1.8rem}
.cover .hearts span:nth-child(3){left:20%;top:70%;animation-delay:4s}
.cover .hearts span:nth-child(4){left:72%;top:65%;animation-delay:6s;font-size:2rem}
.cover .hearts span:nth-child(5){left:45%;top:10%;animation-delay:1s;font-size:1.2rem}
.cover .hearts span:nth-child(6){left:60%;top:80%;animation-delay:3s}
@keyframes floatHeart{0%,100%{transform:translateY(0) scale(1);opacity:.08}50%{transform:translateY(-15px) scale(1.1);opacity:.14}}
.cover img{height:80px;filter:brightness(0) invert(1);margin-bottom:44px;position:relative;z-index:1}
.cover h1{font-size:2.6rem;font-weight:800;letter-spacing:-1px;margin-bottom:8px;position:relative;z-index:1}
.cover h2{font-size:1.3rem;font-weight:400;opacity:.85;position:relative;z-index:1;margin-bottom:6px}
.cover .subtitle{font-size:1rem;opacity:.55;position:relative;z-index:1}
.cover .period{margin-top:36px;padding:10px 28px;border:1px solid rgba(214,80,110,.4);border-radius:30px;font-size:.9rem;letter-spacing:.5px;position:relative;z-index:1;color:#e8a0b4}

/* === LAYOUT === */
.page{max-width:1100px;margin:0 auto;padding:50px 40px}
.page-break{page-break-before:always}

/* === SECTION HEADER === */
.sh{display:flex;align-items:center;gap:14px;margin-bottom:28px;padding-bottom:14px;border-bottom:2px solid #d6506e}
.sh .num{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#d6506e,#b33d58);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;flex-shrink:0}
.sh h2{font-size:1.45rem;font-weight:700;color:#242424}
.sh .tag{font-size:.7rem;background:#fef5f7;color:#c44868;padding:3px 10px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;border:1px solid #f0c6d2}

/* === EXEC SUMMARY === */
.exec-title{font-size:1.8rem;font-weight:800;color:#242424;margin-bottom:6px}
.exec-sub{color:#888;margin-bottom:32px;font-size:.95rem}

/* === KPI CARDS === */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px}
.kpi{background:#fff;border-radius:14px;padding:22px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,#d6506e,#e8a0b4)}
.kpi .kl{font-size:.7rem;text-transform:uppercase;letter-spacing:.6px;color:#999;margin-bottom:8px;font-weight:600}
.kpi .kv{font-size:1.65rem;font-weight:800;color:#242424}
.kpi .ks{font-size:.75rem;color:#aaa;margin-top:4px}

/* === TOP RANKING === */
.ranking{background:#fff;border-radius:14px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:32px}
.ranking h3{font-size:1rem;font-weight:700;margin-bottom:20px;color:#242424}
.rank-item{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.rank-item:last-child{margin-bottom:0}
.rank-pos{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.75rem;flex-shrink:0}
.rank-pos.g{background:linear-gradient(135deg,#ffd700,#ffb300);color:#5d4200}
.rank-pos.s{background:linear-gradient(135deg,#e0e0e0,#bdbdbd);color:#424242}
.rank-pos.b{background:linear-gradient(135deg,#d4a373,#bc8a5f);color:#3e2723}
.rank-pos.n{background:#fef0f3;color:#666}
.rank-name{font-weight:600;font-size:.85rem;flex:1;min-width:130px}
.rank-val{font-weight:700;color:#c44868;font-size:.8rem;font-variant-numeric:tabular-nums;min-width:75px;text-align:right}
.rank-bar-bg{flex:2;height:7px;background:#fef0f3;border-radius:4px;overflow:hidden}
.rank-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,#d6506e,#e8a0b4)}

/* === BOUTIQUE BARS === */
.bout-bars{background:#fff;border-radius:14px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:32px}
.bout-bars h3{font-size:1rem;font-weight:700;margin-bottom:20px;color:#242424}
.bb-item{display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:.85rem}
.bb-item:last-child{margin-bottom:0}
.bb-name{width:120px;text-align:right;font-weight:600;flex-shrink:0}
.bb-bar-bg{flex:1;height:10px;background:#fef0f3;border-radius:5px;overflow:hidden}
.bb-bar{height:100%;border-radius:5px;background:linear-gradient(90deg,#d6506e,#e8a0b4)}
.bb-val{width:90px;font-weight:700;color:#c44868;font-variant-numeric:tabular-nums;font-size:.8rem}
.bb-note{font-size:.72rem;color:#bbb;font-style:italic}

/* === TABLE === */
.tbl-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:24px}
table{width:100%;border-collapse:collapse}
th{background:#242424;color:#fff;padding:11px 14px;text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
th:not(:first-child){text-align:right}
td{padding:10px 14px;border-bottom:1px solid #f0ebe8;font-size:.85rem}
td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
tr:nth-child(even) td{background:#fef9fa}
tr:last-child td{border-bottom:none}
td:first-child{font-weight:600}
.total-row td{background:#fef5f7!important;font-weight:700;color:#c44868;border-top:2px solid #d6506e}

/* === ANALYSIS === */
.analysis{background:linear-gradient(135deg,#fef5f7 0%,#f5d5de 100%);border-radius:14px;padding:20px 24px;font-size:.88rem;line-height:1.7;color:#3d1a28;margin-bottom:10px}
.analysis strong{color:#b33d58}

/* === NO DATA === */
.no-data{background:#fef0f3;border-radius:14px;padding:40px;text-align:center;color:#999;font-size:.95rem}

/* === PRINT === */
@media print{
  body{background:#fff}
  .page{padding:30px 20px}
  .cover{min-height:100vh}
  .kpis{grid-template-columns:repeat(4,1fr)}
  .no-print{display:none}
}
@page{size:A4 landscape;margin:12mm}

@media(max-width:768px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .cover h1{font-size:1.8rem}
  .page{padding:24px 16px}
  table{font-size:.75rem}
  th,td{padding:8px 10px}
}

// ======================== UTILS ========================
function fmt(n){
  if(n==null) return '—';
  return n.toLocaleString('fr-FR');
}
function pct(n,d){
  if(!d||n==null) return '—';
  return (n/d*100).toFixed(1).replace('.',',')+' %';
}
function sumField(ads,f){
  return ads.reduce((s,a)=>{const v=a[f];return v!=null?s+v:s},0);
}
function shortNum(n){
  if(n==null) return '—';
  if(n>=1000000) return (n/1000000).toFixed(1).replace('.',',')+' M';
  if(n>=1000) return (n/1000).toFixed(1).replace('.',',')+' K';
  return n.toString();
}

// ======================== RENDER ========================
function render(){
  const app = document.getElementById('app');
  let html = '';

  // --- EXECUTIVE SUMMARY ---
  // Les ads shared:true (Trafic commune Avignon Nord/Sud) ne sont comptées qu'une fois
  let totalImp=0, totalReach=0, totalEng=0, totalAds=0, influencerSet=new Set();
  let sharedCounted = false;

  BOUTIQUES.forEach(b=>{
    b.ads.forEach(a=>{
      if(a.shared && sharedCounted) return; // skip duplicates
      if(a.imp!=null) totalImp+=a.imp;
      if(a.reach!=null) totalReach+=a.reach;
      totalEng+=a.eng;
      totalAds++;
      influencerSet.add(a.i);
    });
    // Après Avignon Nord (première boutique avec shared), marquer comme compté
    if(b.ads.some(a=>a.shared)) sharedCounted = true;
  });

  html += '<div class="page page-break">';
  html += '<div class="exec-title">Vue d\'ensemble</div>';
  html += '<div class="exec-sub">Synthèse de la campagne Skeepers — Contenus influenceuses sponsorisés via Meta Ads — Saint-Valentin 2026</div>';

  html += '<div class="kpis">';
  html += kpiCard('Impressions totales',shortNum(totalImp),'Tous contenus confondus');
  html += kpiCard('Audience unique totale',shortNum(totalReach),'Nombre de personnes atteintes');
  html += kpiCard('Contenus sponsorisés',totalAds.toString(),influencerSet.size+' influenceuses mobilisées');
  html += kpiCard('Engagements totaux',shortNum(totalEng),'Interactions sur les contenus');
  html += '</div>';

  // ALL influencers ranking — shared ads comptées une seule fois
  const influencerTotals = {};
  let sharedRankCounted = false;
  BOUTIQUES.forEach(b=>{
    b.ads.forEach(a=>{
      if(a.shared && sharedRankCounted) return;
      if(!influencerTotals[a.i]) influencerTotals[a.i]={imp:0,eng:0,count:0};
      if(a.imp!=null) influencerTotals[a.i].imp+=a.imp;
      influencerTotals[a.i].eng+=a.eng;
      influencerTotals[a.i].count++;
    });
    if(b.ads.some(a=>a.shared)) sharedRankCounted = true;
  });
  const allInfluencers = Object.entries(influencerTotals)
    .sort((a,b)=>b[1].imp-a[1].imp);
  const maxImp = allInfluencers[0][1].imp;

  html += '<div class="ranking"><h3>Classement des influenceuses — par impressions totales</h3>';
  allInfluencers.forEach(([name,d],idx)=>{
    const cls = idx===0?'g':idx===1?'s':idx===2?'b':'n';
    const pctW = (d.imp/maxImp*100).toFixed(0);
    html += `<div class="rank-item">
      <div class="rank-pos ${cls}">${idx+1}</div>
      <div class="rank-name">${name}</div>
      <div class="rank-bar-bg"><div class="rank-bar" style="width:${pctW}%"></div></div>
      <div class="rank-val">${shortNum(d.imp)}</div>
    </div>`;
  });
  html += '</div>';

  // Boutique comparison bars — impressions propres à chaque boutique (shared inclus car affecté aux 2)
  const boutData = BOUTIQUES.filter(b=>!b.isNational).map(b=>({
    name:b.name,
    imp:b.noData?0:sumField(b.ads,'imp'),
    noData:!!b.noData
  })).sort((a,b)=>b.imp-a.imp);
  const maxBout = boutData[0].imp;

  html += '<div class="bout-bars"><h3>Impressions par boutique</h3>';
  boutData.forEach(b=>{
    const pctW = maxBout ? (b.imp/maxBout*100).toFixed(0) : '0';
    html += `<div class="bb-item">
      <div class="bb-name">${b.name}</div>
      <div class="bb-bar-bg"><div class="bb-bar" style="width:${pctW}%"></div></div>
      <div class="bb-val">${b.noData?'<span class="bb-note">Pas de contenu Skeepers</span>':shortNum(b.imp)}</div>
    </div>`;
  });
  html += '</div>';
  html += '</div>'; // end exec page

  // --- PER BOUTIQUE SECTIONS ---
  let num = 0;
  BOUTIQUES.forEach(b=>{
    num++;
    html += '<div class="page page-break">';

    // Header
    const tag = b.isNational ? 'National' : b.noData ? 'Pas de données' : b.ads.length+' contenu'+(b.ads.length>1?'s':'');
    html += `<div class="sh">
      <div class="num">${num}</div>
      <h2>${b.label||b.name}</h2>
      <span class="tag">${tag}</span>
    </div>`;

    if(b.noData){
      html += '<div class="no-data">Pas de contenu Skeepers activé sur cette boutique durant la période.<br>Les campagnes utilisaient uniquement des visuels et vidéos internes Body House.</div>';
      html += '</div>';
      return;
    }

    // KPI cards
    const tImp = sumField(b.ads,'imp');
    const tReach = sumField(b.ads,'reach');
    const tEng = sumField(b.ads,'eng');
    const tW50 = sumField(b.ads,'w50');
    const tW100 = sumField(b.ads,'w100');

    html += '<div class="kpis">';
    html += kpiCard('Impressions',shortNum(tImp), tImp?'':'Donnée partielle');
    html += kpiCard('Audience unique',shortNum(tReach), tReach?'':'Donnée partielle');
    html += kpiCard('Engagements',shortNum(tEng), tImp?'Taux : '+pct(tEng,tImp):'');
    html += kpiCard('Rétention 50%',tImp?pct(tW50,tImp):'—', tW50?'Complétion : '+pct(tW100,tW50):'');
    html += '</div>';

    // Table — tri décroissant par impressions
    const sortedAds = [...b.ads].sort((a,b)=>b.imp-a.imp);
    html += '<div class="tbl-wrap"><table>';
    html += '<tr><th>Influenceuse</th><th>Impressions</th><th>Audience unique</th><th>Engagements</th><th>Réactions</th><th>Clics</th><th>CTR</th><th>Vues 50%</th><th>Vues 100%</th></tr>';

    sortedAds.forEach(a=>{
      html += `<tr>
        <td>${a.i}</td>
        <td>${fmt(a.imp)}</td>
        <td>${fmt(a.reach)}</td>
        <td>${fmt(a.eng)}</td>
        <td>${fmt(a.react)}</td>
        <td>${fmt(a.clicks)}</td>
        <td>${a.ctr?a.ctr.toFixed(2).replace('.',',')+' %':'—'}</td>
        <td>${fmt(a.w50)}</td>
        <td>${fmt(a.w100)}</td>
      </tr>`;
    });

    // Total row
    if(b.ads.length > 1){
      const tClicks = sumField(b.ads,'clicks');
      const tReact = sumField(b.ads,'react');
      html += `<tr class="total-row">
        <td>TOTAL</td>
        <td>${fmt(tImp)}</td>
        <td>${fmt(tReach)}</td>
        <td>${fmt(tEng)}</td>
        <td>${fmt(tReact)}</td>
        <td>${fmt(tClicks)}</td>
        <td>—</td>
        <td>${fmt(tW50)}</td>
        <td>${fmt(tW100)}</td>
      </tr>`;
    }
    html += '</table></div>';

    // Analysis
    if(b.analysis){
      html += `<div class="analysis">${b.analysis}</div>`;
    }

    html += '</div>'; // end page
  });

  app.innerHTML = html;
}

function kpiCard(label,value,sub){
  return `<div class="kpi">
    <div class="kl">${label}</div>
    <div class="kv">${value}</div>
    ${sub?'<div class="ks">'+sub+'</div>':''}
  </div>`;
}

render();
</script>
</body>
</html>
