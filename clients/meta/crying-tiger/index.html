<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Crying Tiger — Dashboard Marketing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #C8A96E;
            --primary-dark: #A07D45;
            --accent: #E8D5B0;
            --bg: #0a0908;
            --bg-secondary: #141210;
            --card-bg: rgba(200,169,110,0.04);
            --card-border: rgba(200,169,110,0.10);
            --text: #f0ebe0;
            --text-secondary: rgba(240,235,224,0.50);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── LANDING SCREEN ── */
        #landing {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 600px; height: 600px; background: var(--primary); top: -200px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: var(--primary-dark); bottom: -150px; right: -80px; }
        .orb-3 { width: 300px; height: 300px; background: var(--accent); top: 40%; left: 60%; opacity: 0.08; }

        .landing-content {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-landing {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 32px;
            box-shadow: 0 0 60px rgba(200,169,110,0.25), 0 0 120px rgba(200,169,110,0.10);
        }

        .landing-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 2.4rem;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }

        .landing-tagline {
            font-size: 1rem;
            font-weight: 300;
            color: var(--text-secondary);
            margin-bottom: 48px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .btn-gold {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--bg);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(200,169,110,0.30);
        }

        /* ── PORTAL SCREEN ── */
        #portal {
            display: none;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 32px;
            border-bottom: 1px solid var(--card-border);
            background: var(--bg-secondary);
        }

        .topbar-logo {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .topbar-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.2rem;
            flex: 1;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 20px;
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-back:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .portal-body {
            max-width: 900px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        .portal-subtitle {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.6rem;
            margin-bottom: 8px;
        }

        .portal-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .channel-pills {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
        }

        .pill {
            padding: 6px 18px;
            background: rgba(200,169,110,0.10);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--primary);
            cursor: default;
        }
        .pill.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--bg);
            border-color: transparent;
        }

        .dashboard-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px 28px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }
        .dashboard-card:hover {
            border-color: var(--primary);
            background: rgba(200,169,110,0.07);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(200,169,110,0.08);
        }

        .card-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(200,169,110,0.15), rgba(200,169,110,0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .card-info h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .card-info p {
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .card-arrow {
            margin-left: auto;
            font-size: 1.2rem;
            color: var(--text-secondary);
            transition: color 0.2s;
        }
        .dashboard-card:hover .card-arrow { color: var(--primary); }

        @media (max-width: 600px) {
            .landing-title { font-size: 1.8rem; }
            .logo-landing { width: 120px; height: 120px; }
            .topbar { padding: 12px 16px; }
            .portal-body { padding: 32px 16px; }
        }
    </style>
</head>
<body>

    <!-- Gradient Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- ══════ LANDING ══════ -->
    <div id="landing">
        <div class="landing-content">
            <img src="https://images.squarespace-cdn.com/content/v1/613c09cdfbd3b117e8d82a90/5498ba49-a998-4018-9159-af09f29539d0/CRYING-LOGO-CERCLE-BLANC.png"
                 alt="The Crying Tiger" class="logo-landing">
            <h1 class="landing-title">The Crying Tiger</h1>
            <p class="landing-tagline">Dashboard Marketing</p>
            <button class="btn-gold" onclick="showPortal()">
                Accéder
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
    </div>

    <!-- ══════ PORTAL ══════ -->
    <div id="portal">
        <div class="topbar">
            <img src="https://images.squarespace-cdn.com/content/v1/613c09cdfbd3b117e8d82a90/5498ba49-a998-4018-9159-af09f29539d0/CRYING-LOGO-CERCLE-BLANC.png"
                 alt="Logo" class="topbar-logo">
            <span class="topbar-title">The Crying Tiger</span>
            <a href="#" class="btn-back" onclick="showLanding(); return false;">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Retour
            </a>
        </div>

        <div class="portal-body">
            <h2 class="portal-subtitle">Vos Dashboards</h2>
            <p class="portal-desc">Sélectionnez un canal pour accéder à vos statistiques marketing.</p>

            <div class="channel-pills">
                <span class="pill active">Meta Ads</span>
            </div>

            <a href="dashboard.html" class="dashboard-card">
                <div class="card-icon">
                    <svg width="24" height="24" fill="none" stroke="var(--primary)" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7 14l3-3 2 2 5-5"/></svg>
                </div>
                <div class="card-info">
                    <h3>Meta Ads</h3>
                    <p>Campagnes Facebook & Instagram — Leads, CPL, audiences</p>
                </div>
                <span class="card-arrow">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                </span>
            </a>
        </div>
    </div>

    <script>
        function showPortal() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('portal').style.display = 'block';
        }

        function showLanding() {
            document.getElementById('portal').style.display = 'none';
            document.getElementById('landing').style.display = 'flex';
        }
    </script>
</body>
</html>
