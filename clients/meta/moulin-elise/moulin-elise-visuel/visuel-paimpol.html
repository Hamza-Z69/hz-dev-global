<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }

  .container {
    position: relative;
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }

  /* === PORT DE PAIMPOL - PLEIN ÉCRAN, COULEURS VIVES === */
  .bg-port {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: url('paimpol-port.jpg') center center / cover no-repeat;
    filter: brightness(0.95) saturate(1.1);
  }

  /* === GRADIENT SOMBRE BAS POUR LISIBILITÉ TEXTE === */
  .gradient-bottom {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 65%;
    background: linear-gradient(
      to top,
      rgba(10, 8, 5, 0.97) 0%,
      rgba(10, 8, 5, 0.93) 20%,
      rgba(10, 8, 5, 0.82) 40%,
      rgba(15, 12, 8, 0.5) 60%,
      rgba(20, 15, 10, 0.15) 80%,
      transparent 100%
    );
  }

  /* === GRADIENT LÉGER EN HAUT === */
  .gradient-top {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 200px;
    background: linear-gradient(
      to bottom,
      rgba(10, 8, 5, 0.5) 0%,
      rgba(10, 8, 5, 0.2) 40%,
      transparent 100%
    );
  }

  /* === BOULANGER - DÉCOUPE ARRONDIE === */
  .baker-frame {
    position: absolute;
    top: 130px;
    right: 55px;
    width: 380px;
    height: 430px;
    border-radius: 200px 200px 16px 16px;
    overflow: hidden;
    border: 3px solid rgba(201, 168, 76, 0.6);
    box-shadow: 0 15px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.15);
  }

  .baker-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
  }

  /* === LOGO ORIGINAL === */
  .logo-container {
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
  }

  .logo-container img {
    height: 100px;
    width: auto;
    filter: drop-shadow(0 4px 15px rgba(0,0,0,0.6));
  }

  /* === BADGE LOCALISATION === */
  .location {
    position: absolute;
    top: 42px;
    right: 50px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(201, 168, 76, 0.9);
    border-radius: 25px;
    padding: 8px 20px;
  }

  .location span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 700;
    color: #1a1510;
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }

  /* === CONTENU TEXTE === */
  .content {
    position: absolute;
    bottom: 50px;
    left: 50px;
    right: 50px;
    z-index: 10;
  }

  .accroche {
    background: linear-gradient(135deg, #c9a84c, #dfc06a, #c9a84c);
    display: inline-block;
    padding: 14px 30px;
    border-radius: 3px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(201, 168, 76, 0.25);
  }

  .accroche p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 26px;
    color: #1a1510;
    line-height: 1.4;
  }

  .titre {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 42px;
    color: #ffffff;
    margin-bottom: 14px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
    line-height: 1.15;
  }

  .sous-titre {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 26px;
    color: #c9a84c;
    letter-spacing: 1.5px;
  }

  .separator {
    margin: 0 14px;
    color: #dfc06a;
  }

  /* === FILET DORÉ DÉCORATIF === */
  .gold-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, transparent, #c9a84c, #dfc06a, #c9a84c, transparent);
  }

</style>
</head>
<body>

<div class="container">
  <!-- Port de Paimpol en plein écran -->
  <div class="bg-port"></div>

  <!-- Gradients pour lisibilité -->
  <div class="gradient-top"></div>
  <div class="gradient-bottom"></div>

  <!-- Logo original (crop CSS depuis l'image source) -->
  <div class="logo-container">
    <img src="logo-moulin-elise.png" alt="Logo Moulin d'Élise">
  </div>

  <!-- Badge Paimpol -->
  <div class="location">
    <span>&#9873; Paimpol</span>
  </div>

  <!-- Boulanger dans une découpe élégante -->
  <div class="baker-frame">
    <img src="baker-cropped.png" alt="Boulanger">
  </div>

  <!-- Textes -->
  <div class="content">
    <div class="accroche">
      <p>Tu sais parler au levain ?<br>On devrait bien s'entendre</p>
    </div>
    <h1 class="titre">Nous recrutons un boulanger (H/F)</h1>
    <p class="sous-titre">Levain naturel <span class="separator">&middot;</span> Pain bio</p>
  </div>

  <!-- Filet doré -->
  <div class="gold-line"></div>
</div>

</body>
</html>
