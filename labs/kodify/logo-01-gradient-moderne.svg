<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <linearGradient id="g1b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
  </defs>
  <!-- Icon: K stylisé avec brackets -->
  <rect x="10" y="15" width="90" height="90" rx="20" fill="url(#g1)"/>
  <text x="55" y="80" font-family="monospace" font-size="56" font-weight="bold" fill="white" text-anchor="middle">K</text>
  <text x="30" y="82" font-family="monospace" font-size="28" fill="rgba(255,255,255,0.5)" text-anchor="middle">{</text>
  <text x="80" y="82" font-family="monospace" font-size="28" fill="rgba(255,255,255,0.5)" text-anchor="middle">}</text>
  <!-- Texte -->
  <text x="120" y="78" font-family="'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="700" fill="url(#g1b)">Kōdify</text>
  <!-- Tagline -->
  <text x="122" y="100" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="3">DIGITAL STUDIO</text>
</svg>
