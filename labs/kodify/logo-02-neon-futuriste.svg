<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Fond sombre -->
  <rect width="400" height="120" rx="12" fill="#0f0f1a"/>
  <!-- Ligne néon décorative -->
  <line x1="20" y1="105" x2="380" y2="105" stroke="#00f5ff" stroke-width="1" opacity="0.3"/>
  <!-- Icon: slash avec glow -->
  <text x="55" y="78" font-family="'Courier New', monospace" font-size="60" font-weight="bold" fill="#00f5ff" filter="url(#glow)" text-anchor="middle">/</text>
  <text x="45" y="78" font-family="'Courier New', monospace" font-size="60" font-weight="bold" fill="#ff00aa" filter="url(#glow)" text-anchor="middle" opacity="0.6">&lt;</text>
  <text x="65" y="78" font-family="'Courier New', monospace" font-size="60" font-weight="bold" fill="#ff00aa" filter="url(#glow)" text-anchor="middle" opacity="0.6">&gt;</text>
  <!-- Texte principal -->
  <text x="100" y="72" font-family="'Segoe UI', system-ui, sans-serif" font-size="46" font-weight="800" fill="#ffffff" filter="url(#glow)" letter-spacing="-1">Kōdify</text>
  <!-- Point lumineux sur le ō -->
  <circle cx="143" cy="48" r="2" fill="#00f5ff" filter="url(#glow2)"/>
  <!-- Tagline -->
  <text x="102" y="95" font-family="'Courier New', monospace" font-size="11" fill="#00f5ff" opacity="0.7" letter-spacing="5">WEB &amp; APP STUDIO</text>
</svg>
