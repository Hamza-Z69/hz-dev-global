<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="500" height="150">
  <defs>
    <!-- Glow néon cyan -->
    <filter id="neonCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow néon magenta -->
    <filter id="neonMag" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow texte blanc doux -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow intense pour points -->
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient fond premium -->
    <linearGradient id="n2bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080f"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <!-- Gradient ligne bas -->
    <linearGradient id="n2line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00f5ff;stop-opacity:0.5"/>
      <stop offset="70%" style="stop-color:#bf00ff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#bf00ff;stop-opacity:0"/>
    </linearGradient>
    <!-- Gradient icône cadre -->
    <linearGradient id="n2frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#bf00ff"/>
    </linearGradient>
  </defs>

  <!-- Fond premium noir profond -->
  <rect width="500" height="150" rx="14" fill="url(#n2bg)"/>

  <!-- Grille subtile en fond (texture) -->
  <line x1="0" y1="50" x2="500" y2="50" stroke="#ffffff" stroke-width="0.3" opacity="0.02"/>
  <line x1="0" y1="100" x2="500" y2="100" stroke="#ffffff" stroke-width="0.3" opacity="0.02"/>
  <line x1="125" y1="0" x2="125" y2="150" stroke="#ffffff" stroke-width="0.3" opacity="0.02"/>
  <line x1="250" y1="0" x2="250" y2="150" stroke="#ffffff" stroke-width="0.3" opacity="0.02"/>
  <line x1="375" y1="0" x2="375" y2="150" stroke="#ffffff" stroke-width="0.3" opacity="0.02"/>

  <!-- Cadre icône néon -->
  <rect x="20" y="25" width="100" height="100" rx="22" fill="none" stroke="url(#n2frame)" stroke-width="2" opacity="0.6"/>
  <rect x="26" y="31" width="88" height="88" rx="18" fill="rgba(0,245,255,0.03)"/>

  <!-- Symbole </> premium centré -->
  <text x="50" y="84" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="22" fill="#bf00ff" filter="url(#neonMag)" text-anchor="middle" opacity="0.8">&lt;</text>
  <text x="70" y="84" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="26" fill="#00f5ff" filter="url(#neonCyan)" text-anchor="middle">/</text>
  <text x="90" y="84" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="22" fill="#bf00ff" filter="url(#neonMag)" text-anchor="middle" opacity="0.8">&gt;</text>

  <!-- Points lumineux orbitaux -->
  <circle cx="20" cy="25" r="2.5" fill="#00f5ff" filter="url(#dotGlow)"/>
  <circle cx="120" cy="25" r="2" fill="#bf00ff" filter="url(#dotGlow)"/>
  <circle cx="120" cy="125" r="2.5" fill="#00f5ff" filter="url(#dotGlow)" opacity="0.7"/>

  <!-- Séparateur vertical -->
  <line x1="140" y1="40" x2="140" y2="110" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- Texte principal KŌDIFY -->
  <text x="160" y="82" font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif" font-size="52" font-weight="800" fill="#ffffff" filter="url(#textGlow)" letter-spacing="2">Kōdify</text>

  <!-- Accent lumineux sur le ō -->
  <circle cx="205" cy="53" r="2" fill="#00f5ff" filter="url(#dotGlow)"/>

  <!-- Ligne séparatrice sous le texte -->
  <rect x="162" y="92" width="50" height="1.5" rx="0.75" fill="#00f5ff" opacity="0.4"/>
  <rect x="218" y="92" width="30" height="1.5" rx="0.75" fill="#bf00ff" opacity="0.3"/>

  <!-- Tagline -->
  <text x="162" y="112" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#00f5ff" opacity="0.6" letter-spacing="5">WEB &amp; APP STUDIO</text>

  <!-- Ligne néon bas dégradée -->
  <rect x="20" y="138" width="460" height="1.5" rx="0.75" fill="url(#n2line)"/>

  <!-- Particules d'ambiance -->
  <circle cx="420" cy="30" r="1" fill="#00f5ff" opacity="0.3"/>
  <circle cx="450" cy="50" r="1.5" fill="#bf00ff" opacity="0.2"/>
  <circle cx="390" cy="120" r="1" fill="#00f5ff" opacity="0.2"/>
  <circle cx="470" cy="100" r="1" fill="#bf00ff" opacity="0.15"/>
</svg>
